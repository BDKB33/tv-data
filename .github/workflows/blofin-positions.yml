name: BloFin Positions Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write fetch script
        run: |
          cat > fetch-positions.js << 'ENDOFSCRIPT'
          const crypto = require('crypto');
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.BLOFIN_API_KEY;
          const SECRET = process.env.BLOFIN_SECRET;
          const PASSPHRASE = process.env.BLOFIN_PASSPHRASE;
          const BASE = 'api.blofin.com';
          const PATH = '/api/v1/account/positions';

          const timestamp = Date.now().toString();
          const nonce = crypto.randomBytes(8).toString('hex');

          const preSign = timestamp + 'GET' + PATH + nonce;
          const signature = crypto
            .createHmac('sha256', SECRET)
            .update(preSign)
            .digest('base64');

          const options = {
            hostname: BASE,
            path: PATH,
            method: 'GET',
            headers: {
              'ACCESS-KEY': API_KEY,
              'ACCESS-SIGN': signature,
              'ACCESS-TIMESTAMP': timestamp,
              'ACCESS-NONCE': nonce,
              'ACCESS-PASSPHRASE': PASSPHRASE,
              'Content-Type': 'application/json',
              'Accept': 'application/json',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            console.log('HTTP Status:', res.statusCode);
            console.log('Response headers:', JSON.stringify(res.headers));
            res.on('data', chunk => { data += chunk; });
            res.on('end', () => {
              console.log('Raw response (first 300):', data.substring(0, 300));
              try {
                const parsed = JSON.parse(data);
                console.log('BloFin response code:', parsed.code);

                let positions = [];
                if (parsed.code === '0' && Array.isArray(parsed.data)) {
                  positions = parsed.data.map(p => ({
                    symbol:           p.instId,
                    side:             p.posSide,
                    size:             parseFloat(p.pos) || 0,
                    entryPrice:       parseFloat(p.avgPx) || 0,
                    markPrice:        parseFloat(p.markPx) || 0,
                    unrealizedPnl:    parseFloat(p.upl) || 0,
                    unrealizedPnlPct: parseFloat(p.uplRatio) || 0,
                    leverage:         parseFloat(p.lever) || 0,
                    margin:           parseFloat(p.imr) || 0,
                    liqPrice:         parseFloat(p.liqPx) || 0,
                    marginMode:       p.mgnMode,
                    _updated:         new Date().toISOString()
                  }));
                }

                const output = {
                  positions,
                  count: positions.length,
                  _updated: new Date().toISOString(),
                  _source: 'blofin'
                };

                fs.writeFileSync('positions.json', JSON.stringify(output, null, 2));
                console.log('Written ' + positions.length + ' position(s) to positions.json');
              } catch(e) {
                console.error('Parse error:', e.message);
                const output = {
                  positions: [],
                  count: 0,
                  _updated: new Date().toISOString(),
                  _source: 'blofin',
                  _error: e.message
                };
                fs.writeFileSync('positions.json', JSON.stringify(output, null, 2));
              }
            });
          });

          req.on('error', (e) => {
            console.error('Request error:', e.message);
            const output = {
              positions: [],
              count: 0,
              _updated: new Date().toISOString(),
              _source: 'blofin',
              _error: e.message
            };
            fs.writeFileSync('positions.json', JSON.stringify(output, null, 2));
          });

          req.end();
          ENDOFSCRIPT

      - name: Run fetch script
        env:
          BLOFIN_API_KEY: ${{ secrets.BLOFIN_API_KEY }}
          BLOFIN_SECRET: ${{ secrets.BLOFIN_SECRET }}
          BLOFIN_PASSPHRASE: ${{ secrets.BLOFIN_PASSPHRASE }}
        run: node fetch-positions.js

      - name: Commit positions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add positions.json
          git diff --staged --quiet || git commit -m "Sync BloFin positions"
          git push
