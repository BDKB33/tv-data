name: Receive TradingView Data

on:
  repository_dispatch:
    types: [tradingview_alert]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract symbol and timeframe
        id: meta
        run: |
          SYMBOL="${{ github.event.client_payload.symbol }}"
          TIMEFRAME="${{ github.event.client_payload.timeframe }}"

          # Fallbacks
          if [ -z "$SYMBOL" ]; then SYMBOL="UNKNOWN"; fi
          if [ -z "$TIMEFRAME" ]; then TIMEFRAME="UNK"; fi

          # Normalise timeframe label
          # TradingView sends: 60=1H, 120=2H, 240=4H, 480=8H, 1D, 1W
          case "$TIMEFRAME" in
            "60")   TF="1H"  ;;
            "120")  TF="2H"  ;;
            "240")  TF="4H"  ;;
            "480")  TF="8H"  ;;
            "1D")   TF="1D"  ;;
            "1W")   TF="1W"  ;;
            "1H")   TF="1H"  ;;
            "2H")   TF="2H"  ;;
            "4H")   TF="4H"  ;;
            "8H")   TF="8H"  ;;
            *)      TF="$TIMEFRAME" ;;
          esac

          echo "symbol=$SYMBOL"    >> $GITHUB_OUTPUT
          echo "timeframe=$TF"     >> $GITHUB_OUTPUT
          echo "filekey=${SYMBOL}_${TF}" >> $GITHUB_OUTPUT

      - name: Write symbol+timeframe file
        run: |
          SYMBOL="${{ steps.meta.outputs.symbol }}"
          TF="${{ steps.meta.outputs.timeframe }}"
          FILEKEY="${{ steps.meta.outputs.filekey }}"
          RECEIVED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo '${{ toJson(github.event.client_payload) }}' | node -e "
            const chunks = [];
            process.stdin.on('data', d => chunks.push(d));
            process.stdin.on('end', () => {
              const obj = JSON.parse(chunks.join(''));
              obj._received = '$RECEIVED';
              obj._sample = false;
              obj._timeframe_normalised = '$TF';
              const out = JSON.stringify(obj, null, 2);
              const fs = require('fs');

              // Per-symbol-timeframe file  e.g. ETHUSDT_4H.json
              fs.writeFileSync('${FILEKEY}.json', out);

              // Per-symbol latest file  e.g. ETHUSDT.json (always latest TF received)
              fs.writeFileSync('${SYMBOL}.json', out);

              // Global latest file
              fs.writeFileSync('data.json', out);
            });
          "

      - name: Update history files
        run: |
          SYMBOL="${{ steps.meta.outputs.symbol }}"
          TF="${{ steps.meta.outputs.timeframe }}"
          FILEKEY="${{ steps.meta.outputs.filekey }}"

          # Ensure all history files exist
          for f in "history_${FILEKEY}.json" "history_${SYMBOL}.json" "history_ALL.json"; do
            [ ! -f "$f" ] && echo "[]" > "$f"
          done

          node -e "
            const fs = require('fs');
            const entry = JSON.parse(fs.readFileSync('${FILEKEY}.json', 'utf8'));

            // Per symbol+timeframe history  e.g. history_ETHUSDT_4H.json
            const sfKey = 'history_${FILEKEY}.json';
            const hKey = JSON.parse(fs.readFileSync(sfKey, 'utf8'));
            hKey.push(entry);
            fs.writeFileSync(sfKey, JSON.stringify(hKey.slice(-500), null, 2));

            // Per symbol history (all timeframes)  e.g. history_ETHUSDT.json
            const sfSym = 'history_${SYMBOL}.json';
            const hSym = JSON.parse(fs.readFileSync(sfSym, 'utf8'));
            hSym.push(entry);
            fs.writeFileSync(sfSym, JSON.stringify(hSym.slice(-1000), null, 2));

            // Combined all symbols all timeframes
            const sfAll = 'history_ALL.json';
            const hAll = JSON.parse(fs.readFileSync(sfAll, 'utf8'));
            hAll.push(entry);
            fs.writeFileSync(sfAll, JSON.stringify(hAll.slice(-3000), null, 2));
          "

      - name: Commit all changes
        run: |
          SYMBOL="${{ steps.meta.outputs.symbol }}"
          TF="${{ steps.meta.outputs.timeframe }}"
          FILEKEY="${{ steps.meta.outputs.filekey }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            "${FILEKEY}.json" \
            "${SYMBOL}.json" \
            "data.json" \
            "history_${FILEKEY}.json" \
            "history_${SYMBOL}.json" \
            "history_ALL.json"

          git diff --staged --quiet || git commit -m "tv: ${SYMBOL} ${TF} @ ${TIMESTAMP}"
          git push

# ─────────────────────────────────────────────────────────────────
# FILE STRUCTURE THIS CREATES
# ─────────────────────────────────────────────────────────────────
#
# Per symbol + timeframe (primary files dashboard reads):
#   ETHUSDT_1H.json
#   ETHUSDT_2H.json
#   ETHUSDT_4H.json
#   ETHUSDT_8H.json
#   ETHUSDT_1D.json
#   ETHUSDT_1W.json
#   BTCUSDT_1H.json  ... (same pattern for all 6 symbols)
#   XRPUSDT_1H.json
#   SOLUSDT_1H.json
#   ADAUSDT_1H.json
#   SUIUSDT_1H.json
#
# Per symbol latest (always the most recent TF that fired):
#   ETHUSDT.json
#   BTCUSDT.json  ... etc
#
# Global latest:
#   data.json
#
# History files:
#   history_ETHUSDT_4H.json   (last 500 candles, that symbol+TF)
#   history_ETHUSDT.json      (last 1000 candles, all TFs for ETH)
#   history_ALL.json          (last 3000 candles, everything)
#
# ─────────────────────────────────────────────────────────────────
# INITIALISATION — create these empty placeholder files in GitHub
# before your first alert fires
# ─────────────────────────────────────────────────────────────────
#
# For each of the 36 combinations below, create SYMBOL_TF.json = {}
#
# ETHUSDT_1H.json   BTCUSDT_1H.json   XRPUSDT_1H.json
# SOLUSDT_1H.json   ADAUSDT_1H.json   SUIUSDT_1H.json
# ETHUSDT_2H.json   BTCUSDT_2H.json   XRPUSDT_2H.json
# SOLUSDT_2H.json   ADAUSDT_2H.json   SUIUSDT_2H.json
# ETHUSDT_4H.json   BTCUSDT_4H.json   XRPUSDT_4H.json
# SOLUSDT_4H.json   ADAUSDT_4H.json   SUIUSDT_4H.json
# ETHUSDT_8H.json   BTCUSDT_8H.json   XRPUSDT_8H.json
# SOLUSDT_8H.json   ADAUSDT_8H.json   SUIUSDT_8H.json
# ETHUSDT_1D.json   BTCUSDT_1D.json   XRPUSDT_1D.json
# SOLUSDT_1D.json   ADAUSDT_1D.json   SUIUSDT_1D.json
# ETHUSDT_1W.json   BTCUSDT_1W.json   XRPUSDT_1W.json
# SOLUSDT_1W.json   ADAUSDT_1W.json   SUIUSDT_1W.json
#
# History placeholders (create each = []):
# history_ETHUSDT_1H.json  ... (one per symbol+TF combination)
# history_ETHUSDT.json     ... (one per symbol)
# history_ALL.json
