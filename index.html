<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0d;
  --bg2: #111318;
  --bg3: #181c23;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8890a0;
  --text3: #50586a;
  --bull: #2dce72;
  --bull-bg: rgba(45,206,114,0.1);
  --bear: #ff4d6a;
  --bear-bg: rgba(255,77,106,0.1);
  --neut: #8890a0;
  --neut-bg: rgba(136,144,160,0.1);
  --accent: #4e9eff;
  --accent-bg: rgba(78,158,255,0.1);
  --warn: #ffb347;
  --warn-bg: rgba(255,179,71,0.1);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
.scanline { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 1000; }
header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--bg); }
.logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 1.5rem; }
.live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--bull); background: var(--bull-bg); padding: 4px 10px; border-radius: 4px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bull); animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.last-update { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.refresh-btn { font-family: var(--mono); font-size: 11px; color: var(--accent); background: var(--accent-bg); border: 1px solid rgba(78,158,255,0.2); padding: 5px 14px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.refresh-btn:hover { background: rgba(78,158,255,0.2); }
main { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
.section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 1rem; }
.token-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
.token-card { background: var(--bg2); padding: 1.25rem; transition: background 0.15s; }
.token-card:hover { background: var(--bg3); }
.tc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.tc-sym { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
.tc-tf { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
.badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: 1px; }
.badge.bull { color: var(--bull); background: var(--bull-bg); }
.badge.bear { color: var(--bear); background: var(--bear-bg); }
.badge.neut { color: var(--neut); background: var(--neut-bg); }
.tc-price { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.tc-change { font-family: var(--mono); font-size: 11px; }
.tc-change.up { color: var(--bull); }
.tc-change.dn { color: var(--bear); }
.divider { height: 1px; background: var(--border); margin: 10px 0; }
.ind-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.ind-row { display: flex; justify-content: space-between; align-items: center; }
.ind-label { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.ind-val { font-family: var(--mono); font-size: 11px; font-weight: 500; }
.ind-val.bull { color: var(--bull); }
.ind-val.bear { color: var(--bear); }
.ind-val.neut { color: var(--text2); }
.ind-val.warn { color: var(--warn); }
.ew-badge { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
.ew-impulse { color: var(--bull); background: var(--bull-bg); }
.ew-corrective { color: var(--warn); background: var(--warn-bg); }
.score-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 4px; }
.score-label { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.score-num { font-family: var(--mono); font-size: 11px; font-weight: 700; }
.score-track { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.mtf-section { margin-bottom: 2rem; }
.mtf-grid { display: grid; grid-template-columns: 120px repeat(6, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.mtf-cell { background: var(--bg2); padding: 10px 8px; font-family: var(--mono); font-size: 11px; text-align: center; }
.mtf-cell.header { background: var(--bg3); color: var(--text3); font-size: 10px; letter-spacing: 1px; }
.mtf-cell.sym-label { text-align: left; font-weight: 700; color: var(--text); padding-left: 14px; }
.pos-section { margin-bottom: 2rem; }
.pos-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.pos-card-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); background: var(--bg3); }
.pos-sym { font-size: 15px; font-weight: 800; color: var(--text); }
.pos-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }
.pos-short-badge { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--bear); background: var(--bear-bg); padding: 4px 12px; border-radius: 4px; letter-spacing: 1px; }
.pos-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
.pm { background: var(--bg2); padding: 14px 16px; }
.pm-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.5px; }
.pm-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text); }
.pm-val.red { color: var(--bear); }
.pm-val.green { color: var(--bull); }
.pm-val.warn { color: var(--warn); }
.counsel-box { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
.counsel-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 1.5px; margin-bottom: 8px; }
.counsel-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.counsel-text strong { color: var(--text); font-weight: 700; }
.signal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.signal-dot { width: 7px; height: 7px; border-radius: 50%; }
.loading { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 13px; color: var(--text3); }
.footer { text-align: center; padding: 1.5rem; font-family: var(--mono); font-size: 10px; color: var(--text3); border-top: 1px solid var(--border); margin-top: 2rem; }
.rate-warning { font-family: var(--mono); font-size: 10px; color: var(--warn); background: var(--warn-bg); padding: 6px 12px; border-radius: 4px; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="scanline"></div>
<header>
  <div class="logo">SIGNAL<span>DESK</span></div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
    <div class="last-update" id="last-update">Loading...</div>
    <button class="refresh-btn" onclick="loadAll()">REFRESH</button>
  </div>
</header>
<main>
  <div class="rate-warning" id="rate-warning">GitHub API rate limit — showing cached data</div>
  <div class="section-label">Market compass — 1H</div>
  <div class="token-grid" id="token-grid"><div class="loading">Fetching live data...</div></div>
  <div class="section-label">Multi-timeframe consensus</div>
  <div class="mtf-section"><div class="mtf-grid" id="mtf-grid"><div class="loading" style="grid-column:1/-1;">Loading MTF data...</div></div></div>
  <div class="section-label">Open position</div>
  <div class="pos-section"><div class="pos-card" id="pos-card"><div class="loading">Loading position...</div></div></div>
</main>
<div class="footer">Signal Desk · BDKB33/tv-data · Auto-refreshes every 5 min · <span id="footer-time"></span></div>

<script>
const OWNER = 'BDKB33', REPO = 'tv-data', BRANCH = 'main';
const SYMBOLS = ['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','ADAUSDT','SUIUSDT'];
const LABELS  = ['BTC','ETH','SOL','XRP','ADA','SUI'];
const TIMEFRAMES = ['1H','2H','4H','8H','1D','1W'];
let marketData = {};
let rateLimited = false;

async function fetchFile(sym, tf) {
  try {
    const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${sym}_${tf}.json`;
    const r = await fetch(apiUrl, {
      headers: { 'Accept': 'application/vnd.github.v3.raw' }
    });
    if (r.status === 403 || r.status === 429) {
      rateLimited = true;
      const fallback = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${sym}_${tf}.json?t=${Date.now()}`);
      if (!fallback.ok) return null;
      const d = await fallback.json();
      return (d && Object.keys(d).length > 2) ? d : null;
    }
    if (!r.ok) return null;
    const d = await r.json();
    return (d && Object.keys(d).length > 2) ? d : null;
  } catch { return null; }
}

async function loadAll() {
  document.getElementById('last-update').textContent = 'Refreshing...';
  rateLimited = false;
  const fetches = [];
  for (const sym of SYMBOLS) {
    marketData[sym] = {};
    for (const tf of TIMEFRAMES) {
      fetches.push(fetchFile(sym, tf).then(d => { if (d) marketData[sym][tf] = d; }));
    }
  }
  await Promise.all(fetches);
  document.getElementById('rate-warning').style.display = rateLimited ? 'block' : 'none';
  renderTokenGrid();
  renderMTF();
  renderPosition();
  const now = new Date();
  document.getElementById('last-update').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + ' ET';
  document.getElementById('footer-time').textContent = now.toISOString().substring(0,19) + ' UTC';
}

function score(d) {
  if (!d) return 0;
  let s = 0, c = 0;
  const add = (v, w=1) => { if (v !== null && v !== undefined && !isNaN(v)) { s += v*w; c += w; } };
  if (d.close && d.sma50)  add(d.close > d.sma50  ? 1 : -1, 2);
  if (d.close && d.sma200) add(d.close > d.sma200 ? 1 : -1, 2);
  if (d.close && d.vwap)   add(d.close > d.vwap   ? 1 : -1, 2);
  if (d.close && d.ema50)  add(d.close > d.ema50  ? 1 : -1, 1);
  if (d.macdHist != null)  add(d.macdHist > 0 ? 1 : -1, 2);
  if (d.trendBias != null) add(d.trendBias, 3);
  if (d.rsi != null) { if (d.rsi > 70) add(-0.5); else if (d.rsi < 30) add(0.5); else add((d.rsi-50)/50); }
  if (d.stochK != null) { if (d.stochK > 80) add(-0.3); else if (d.stochK < 20) add(0.3); }
  if (d.ewDirection != null) add(d.ewDirection, 1);
  if (d.fracResActive != null) add(d.fracResActive === 1 ? -0.5 : 0.5, 1);
  if (d.fracSupActive != null) add(d.fracSupActive === 1 ? 0.5 : -0.5, 1);
  if (d.rsiDiv != null && d.rsiDiv !== 0) add(d.rsiDiv, 1.5);
  return c > 0 ? Math.round((s/c)*100) : 0;
}

function sc(s) { return s > 20 ? 'bull' : s < -20 ? 'bear' : 'neut'; }
function sl(s) { return s > 20 ? 'BULL' : s < -20 ? 'BEAR' : 'NEUT'; }

function fmtP(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000) return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (n >= 10) return '$' + n.toFixed(2);
  if (n >= 1) return '$' + n.toFixed(4);
  return '$' + n.toFixed(5);
}

function ewLabel(count, dir) {
  if (count == null) return '—';
  if (count > 0) return 'W' + count + ' ' + (dir === 1 ? '▲' : '▼');
  const abc = {'-1':'A','-2':'B','-3':'C'};
  return (abc[count] || '?') + ' ' + (dir === 1 ? '▲' : '▼');
}

function fibProximity(close, d) {
  if (!close || !d) return null;
  const levels = [
    {label:'0.236', val: d.fib236},
    {label:'0.382', val: d.fib382},
    {label:'0.500', val: d.fib500},
    {label:'0.618', val: d.fib618},
    {label:'0.786', val: d.fib786}
  ].filter(f => f.val != null);
  if (!levels.length) return null;
  let closest = levels[0];
  levels.forEach(f => { if (Math.abs(f.val - close) < Math.abs(closest.val - close)) closest = f; });
  return Math.abs((close - closest.val) / close * 100) < 1 ? closest.label : null;
}

function renderTokenGrid() {
  const grid = document.getElementById('token-grid');
  let html = '';
  SYMBOLS.forEach((sym, i) => {
    const d = marketData[sym]?.['1H'];
    if (!d) {
      html += '<div class="token-card"><div class="tc-header"><div><div class="tc-sym">' + LABELS[i] + ' / USDT</div><div class="tc-tf">1H · No data</div></div></div><div style="font-family:var(--mono);font-size:11px;color:var(--text3);padding-top:8px;">Awaiting candle close...</div></div>';
      return;
    }
    const s = score(d);
    const scc = sc(s);
    const pct = Math.min(100, Math.abs(s));
    const barColor = scc === 'bull' ? 'var(--bull)' : scc === 'bear' ? 'var(--bear)' : 'var(--neut)';
    const chg = d.open ? ((d.close - d.open) / d.open * 100) : 0;
    const rsiC = d.rsi > 70 ? 'warn' : d.rsi < 30 ? 'bull' : 'neut';
    const stochC = d.stochK > 80 ? 'warn' : d.stochK < 20 ? 'bull' : 'neut';
    const ewStr = ewLabel(d.ewCount, d.ewDirection);
    const ewImpulse = d.ewCount > 0;
    const nearFib = fibProximity(d.close, d);
    const timeStr = d._received ? d._received.substring(11,16) + ' UTC' : '—';
    const fracRes = d.fracResistance ? fmtP(d.fracResistance) : '—';
    const fracSup = d.fracSupport ? fmtP(d.fracSupport) : '—';
    const rsiDivStr = d.rsiDiv === 1 ? '<span class="ind-val bull">BULL DIV</span>' : d.rsiDiv === -1 ? '<span class="ind-val bear">BEAR DIV</span>' : '<span class="ind-val neut">NONE</span>';

    html += '<div class="token-card">' +
      '<div class="tc-header"><div><div class="tc-sym">' + LABELS[i] + ' / USDT</div><div class="tc-tf">1H · ' + timeStr + '</div></div><span class="badge ' + scc + '">' + sl(s) + '</span></div>' +
      '<div class="tc-price">' + fmtP(d.close) + '</div>' +
      '<div class="tc-change ' + (chg >= 0 ? 'up' : 'dn') + '">' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + '% vs open</div>' +
      '<div class="divider"></div>' +
      '<div class="ind-grid">' +
        '<div class="ind-row"><span class="ind-label">SMA50</span><span class="ind-val ' + (d.sma50 ? (d.close > d.sma50 ? 'bull' : 'bear') : 'neut') + '">' + (d.sma50 ? (d.close > d.sma50 ? 'ABOVE' : 'BELOW') : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">SMA200</span><span class="ind-val ' + (d.sma200 ? (d.close > d.sma200 ? 'bull' : 'bear') : 'neut') + '">' + (d.sma200 ? (d.close > d.sma200 ? 'ABOVE' : 'BELOW') : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">VWAP</span><span class="ind-val ' + (d.vwap ? (d.close > d.vwap ? 'bull' : 'bear') : 'neut') + '">' + (d.vwap ? (d.close > d.vwap ? 'ABOVE' : 'BELOW') : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">MACD</span><span class="ind-val ' + (d.macdHist != null ? (d.macdHist > 0 ? 'bull' : 'bear') : 'neut') + '">' + (d.macdHist != null ? (d.macdHist > 0 ? 'BULL' : 'BEAR') : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">RSI</span><span class="ind-val ' + rsiC + '">' + (d.rsi != null ? d.rsi.toFixed(1) : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">STOCH K</span><span class="ind-val ' + stochC + '">' + (d.stochK != null ? d.stochK.toFixed(1) : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">BB WIDTH</span><span class="ind-val neut">' + (d.bbWidth != null ? d.bbWidth.toFixed(2) : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">ATR</span><span class="ind-val neut">' + (d.atr != null ? fmtP(d.atr) : '—') + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">RSI DIV</span>' + rsiDivStr + '</div>' +
        '<div class="ind-row"><span class="ind-label">ELLIOTT</span><span class="ew-badge ' + (ewImpulse ? 'ew-impulse' : 'ew-corrective') + '">' + ewStr + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">FRAC RES</span><span class="ind-val bear">' + fracRes + '</span></div>' +
        '<div class="ind-row"><span class="ind-label">FRAC SUP</span><span class="ind-val bull">' + fracSup + '</span></div>' +
      '</div>' +
      (nearFib ? '<div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--accent);">Near Fib ' + nearFib + ' level</div>' : '') +
      '<div class="score-row"><span class="score-label">CONFLUENCE</span><span class="score-num" style="color:' + barColor + '">' + (s > 0 ? '+' : '') + s + '</span></div>' +
      '<div class="score-track"><div class="score-fill" style="width:' + pct + '%;background:' + barColor + ';"></div></div>' +
      '</div>';
  });
  grid.innerHTML = html || '<div class="loading">No data available</div>';
}

function renderMTF() {
  const grid = document.getElementById('mtf-grid');
  let html = '<div class="mtf-cell header sym-label">TOKEN</div>';
  TIMEFRAMES.forEach(tf => { html += '<div class="mtf-cell header">' + tf + '</div>'; });
  SYMBOLS.forEach((sym, i) => {
    html += '<div class="mtf-cell sym-label">' + LABELS[i] + '</div>';
    TIMEFRAMES.forEach(tf => {
      const d = marketData[sym]?.[tf];
      const s = score(d);
      const scc = sc(s);
      const color = scc === 'bull' ? 'var(--bull)' : scc === 'bear' ? 'var(--bear)' : 'var(--neut)';
      const label = scc === 'bull' ? '▲' : scc === 'bear' ? '▼' : '—';
      html += '<div class="mtf-cell" style="color:' + color + ';opacity:' + (d ? 1 : 0.2) + ';font-weight:700;">' + (d ? label + ' ' + Math.abs(s) : '·') + '</div>';
    });
  });
  grid.innerHTML = html;
}

function renderPosition() {
  const ethD = marketData['ETHUSDT']?.['1H'];
  const currentPrice = ethD?.close || 2248.82;
  const entry = 2229.00;
  const liq = 2293.53;
  const tp = 1999.00;
  const margin = 87.99;
  const size = 2627.87;
  const pnlPct = ((entry - currentPrice) / entry * 100 * 30);
  const pnlDollar = (pnlPct / 100 * margin).toFixed(2);
  const distToLiq = ((liq - currentPrice) / currentPrice * 100).toFixed(2);
  const s = score(ethD);
  const scc = sc(s);
  const sigColor = scc === 'bull' ? 'var(--bull)' : scc === 'bear' ? 'var(--bear)' : 'var(--neut)';
  const conflictsShort = scc === 'bull';
  const ewStr = ethD ? ewLabel(ethD.ewCount, ethD.ewDirection) : '—';
  const fracRes = ethD?.fracResistance ? fmtP(ethD.fracResistance) : '—';
  const fracSup = ethD?.fracSupport ? fmtP(ethD.fracSupport) : '—';

  document.getElementById('pos-card').innerHTML =
    '<div class="pos-card-header"><div><div class="pos-sym">ETHUSDT PERP</div><div class="pos-meta">30x Isolated · Size $' + size.toLocaleString() + ' · Entry $' + entry.toFixed(2) + '</div></div><span class="pos-short-badge">SHORT</span></div>' +
    '<div class="pos-metrics">' +
      '<div class="pm"><div class="pm-label">MARK PRICE</div><div class="pm-val">' + fmtP(currentPrice) + '</div></div>' +
      '<div class="pm"><div class="pm-label">UNREAL PNL</div><div class="pm-val ' + (parseFloat(pnlDollar) >= 0 ? 'green' : 'red') + '">' + (parseFloat(pnlDollar) >= 0 ? '+' : '') + '$' + pnlDollar + '</div></div>' +
      '<div class="pm"><div class="pm-label">LIQ PRICE</div><div class="pm-val warn">' + fmtP(liq) + '</div></div>' +
      '<div class="pm"><div class="pm-label">LIQ DISTANCE</div><div class="pm-val ' + (parseFloat(distToLiq) < 3 ? 'red' : 'warn') + '">' + distToLiq + '%</div></div>' +
      '<div class="pm"><div class="pm-label">TAKE PROFIT</div><div class="pm-val green">' + fmtP(tp) + '</div></div>' +
      '<div class="pm"><div class="pm-label">STOP LOSS</div><div class="pm-val red">Not set</div></div>' +
      '<div class="pm"><div class="pm-label">ELLIOTT WAVE</div><div class="pm-val">' + ewStr + '</div></div>' +
      '<div class="pm"><div class="pm-label">FRAC RES/SUP</div><div class="pm-val" style="font-size:11px;">' + fracRes + ' / ' + fracSup + '</div></div>' +
    '</div>' +
    '<div class="counsel-box"><div class="counsel-label">SIGNAL COUNSEL</div>' +
    '<div class="signal-row"><div class="signal-dot" style="background:' + sigColor + '"></div><span style="font-family:var(--mono);font-size:11px;font-weight:700;color:' + sigColor + '">1H: ' + sl(s) + ' (' + (s > 0 ? '+' : '') + s + ')</span><span style="font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:4px;">' + (conflictsShort ? '— CONFLICTS WITH SHORT' : '— SUPPORTS SHORT') + '</span></div>' +
    '<div class="counsel-text">' + (conflictsShort ? '<strong>Position under pressure.</strong> 1H signal bullish. Liq at $' + liq + ' is ' + distToLiq + '% away. No stop loss set is critical risk. Elliott Wave: ' + ewStr + '. Fractal resistance at ' + fracRes + '. Consider adding margin or closing.' : '<strong>Short thesis supported.</strong> Signal aligns with position. Monitor StochRSI and MACD for confirmation. TP at $' + tp + ' remains valid. Elliott Wave: ' + ewStr + '.') + '</div></div>';
}

loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
