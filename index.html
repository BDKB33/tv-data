<!-- ── COPY TO CLAUDE ─────────────────────────────────────────────────── -->
<style>
#ctc-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9990;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  font-weight: 700;
  color: var(--bg);
  background: var(--accent);
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 0 20px rgba(77,156,255,0.4);
  transition: all 0.15s;
}
#ctc-btn:hover {
  background: #6ab0ff;
  box-shadow: 0 0 30px rgba(77,156,255,0.6);
  transform: translateY(-1px);
}
#ctc-btn.copied {
  background: var(--bull);
  box-shadow: 0 0 20px rgba(0,240,144,0.5);
}
#ctc-toast {
  position: fixed;
  bottom: 70px;
  right: 24px;
  z-index: 9990;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--bull);
  background: var(--bg3);
  border: 1px solid rgba(0,240,144,0.3);
  padding: 6px 12px;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
#ctc-toast.show { opacity: 1; }
</style>

<button id="ctc-btn" onclick="copyToClaude()">⬆ COPY TO CLAUDE</button>
<div id="ctc-toast">COPIED · PASTE INTO CLAUDE</div>

<script>
function copyToClaude() {
  const SYMS = ['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','ADAUSDT','SUIUSDT'];
  const TFS  = ['1H','4H','1D'];
  const now  = new Date().toISOString();

  // Build compact payload — all loaded candles
  const payload = { _generated: now, _mode: activeMode, symbols: {} };

  SYMS.forEach(sym => {
    payload.symbols[sym] = {};
    TFS.forEach(tf => {
      const d = mkt[sym]?.[tf];
      if (!d || Object.keys(d).length < 3) return;
      // Include all fields but skip raw HTML / large blobs
      payload.symbols[sym][tf] = d;
    });
    // Attach computed scores
    const b1 = getBDKB(sym,'1H'), b4 = getBDKB(sym,'4H'), bD = getBDKB(sym,'1D');
    const mtf = getMTFScore(sym);
    payload.symbols[sym]._scores = {
      '1H': b1 ? { score: b1.score, state: b1.state, direction: b1.direction, longScore: b1.longScore, shortScore: b1.shortScore } : null,
      '4H': b4 ? { score: b4.score, state: b4.state, direction: b4.direction, longScore: b4.longScore, shortScore: b4.shortScore } : null,
      '1D': bD ? { score: bD.score, state: bD.state, direction: bD.direction, longScore: bD.longScore, shortScore: bD.shortScore } : null,
      mtf:  { score: mtf.score, quality: mtf.quality, direction: mtf.direction, trendBias: mtf.trendBias, tradeReady: mtf.tradeReady }
    };
  });

  // Build human-readable summary header
  const lines = [
    '=== SIGNAL DESK · LIVE DATA DUMP ===',
    `Timestamp: ${now}`,
    `Mode: ${activeMode}`,
    '',
    '--- SCORE SUMMARY ---'
  ];

  SYMS.forEach(sym => {
    const sc = payload.symbols[sym]._scores;
    if (!sc) return;
    const label = sym.replace('USDT','');
    const d1    = mkt[sym]?.['1H'];
    const price = d1?.close != null ? d1.close : '—';
    lines.push(
      `${label} $${price} | ` +
      `1H: ${sc['1H']?.score??'—'} ${sc['1H']?.state??''} ${sc['1H']?.direction??''} | ` +
      `4H: ${sc['4H']?.score??'—'} ${sc['4H']?.state??''} ${sc['4H']?.direction??''} | ` +
      `1D: ${sc['1D']?.score??'—'} ${sc['1D']?.state??''} ${sc['1D']?.direction??''} | ` +
      `MTF: ${sc.mtf.score} ${sc.mtf.quality} ${sc.mtf.direction}${sc.mtf.tradeReady?' ★TRADE READY':''}`
    );
  });

  lines.push('');
  lines.push('--- FULL JSON PAYLOAD ---');
  lines.push(JSON.stringify(payload, null, 2));

  const text = lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn   = document.getElementById('ctc-btn');
    const toast = document.getElementById('ctc-toast');
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    toast.classList.add('show');
    setTimeout(() => {
      btn.textContent = '⬆ COPY TO CLAUDE';
      btn.classList.remove('copied');
      toast.classList.remove('show');
    }, 2500);
  }).catch(() => {
    // Fallback for browsers that block clipboard
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity  = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Copied! Paste into Claude.');
  });
}
</script>
